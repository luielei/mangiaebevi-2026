<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coppa Mangia e Bevi 2026</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
    }
    table {
      width: 100%;
      margin-top: 2rem;
    }
    h1, h2 {
      text-align: center;
    }
    .highlight {
      background-color: #d4edda !important;
    }
#chart-container {
  width: 100%;
  max-width: 1000px;
  height: 350px; /* Fissa l'altezza */
  margin: 3rem auto;
  position: relative;
}

canvas#speseChart {
  position: absolute;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
}
  </style>

  <!-- Librerie esterne -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase SDK compat (non-module) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>

<body>
  <h1>Lui & Lei - Coppa Mangia & Bevi 2026</h1>

<h2>Top 10</h2>
<div id="chart-container">
  <canvas id="speseChart"></canvas>
</div>
<!--
    <table id="classifica">
      <thead>
        <tr><th>Squadra</th><th>Totale (CHF)</th></tr>
      </thead>
      <tbody></tbody>
    </table>
-->
  <script>
    // Configurazione Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBr6nu9AM-CuZmIAArzqVFLurBNXdYmOCI",
  authDomain: "mangiaebevi-2026.firebaseapp.com",
  databaseURL: "https://mangiaebevi-2026-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "mangiaebevi-2026",
  storageBucket: "mangiaebevi-2026.firebasestorage.app",
  messagingSenderId: "844364471012",
  appId: "1:844364471012:web:1cf2d8edcbb9fd3010aaf1"
};

    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
// Aggiungi l'URL del database corretto:
const db = firebase.database(); // funziona ORA perché l’URL è nel config

    const dbRef = db.ref("spese");
    let speseChartInstance = null;
    dbRef.on("value", (snapshot) => {
      const data = snapshot.val();
      const totals = [];

      for (const squadra in data) {
        const spese = data[squadra];
        const totale = spese.reduce((sum, val) => sum + parseFloat(val), 0);
        const nomeVisuale = squadra.replace(/_/g, ' ').toUpperCase();
        totals.push({ squadra: nomeVisuale, totale });
      }

      totals.sort((a, b) => b.totale - a.totale);
/*	
      // Popola la tabella
      const tbody = document.querySelector("#classifica tbody");
      tbody.innerHTML = '';
      totals.slice(0, 5).forEach((t, idx) => {
        const tr = document.createElement("tr");
        if (idx === 0) tr.classList.add("highlight");
        tr.innerHTML = `<td>${t.squadra}</td><td>${t.totale.toFixed(2)}</td>`;
        tbody.appendChild(tr);
      });
      if ($.fn.dataTable.isDataTable('#classifica')) {
  $('#classifica').DataTable().clear().destroy();
}
*/
new DataTable('#classifica', {
  order: [[1, 'desc']]
});

      // Grafico top 10
      const top10 = totals.slice(0, 10);
      const ctx = document.getElementById('speseChart').getContext('2d');
      if (speseChartInstance) { speseChartInstance.destroy(); }
      speseChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: top10.map(t => t.squadra),
          datasets: [{
            label: 'Spese CHF',
            data: top10.map(t => t.totale),
            borderWidth: 1
          }]
        },
        options: {
         indexAxis: 'y',
         responsive: true,
         maintainAspectRatio: false,
         scales: {
           x: {
             beginAtZero: true,
             ticks: {
               display: false
             },
             grid: {
               display: true
             }
           }
         },
          plugins: {
          legend: { display: false },
          tooltip: { enabled: false },     // opzionale
          datalabels: { display: false }   // niente cifre nel grafico
         }
        }
      });
    });
  </script>
</body>
</html>
